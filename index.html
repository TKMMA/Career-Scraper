<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAR Job Listings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        h2 { color: #003366; border-bottom: 2px solid #ce9d00; padding-bottom: 10px; margin-top: 30px; font-weight: 700; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 40px; }
        .table thead { background-color: #003366; color: white; }
        .btn-apply { background-color: #ce9d00; color: white; border: none; font-weight: bold; }
        .btn-apply:hover { background-color: #b08600; color: white; }
        .status { font-size: 0.9rem; color: #4a4a4a; }
        .salary-toggle-btn { 
            font-size: 0.7rem; 
            padding: 2px 5px; 
            margin-left: 8px; 
            vertical-align: middle; 
            cursor: pointer;
            border: 1px solid #fff;
            color: #fff;
            background: transparent;
            border-radius: 4px;
        }
        .salary-toggle-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div id="status" class="alert alert-info status mb-4">Loading job listings...</div>

    <h2>Civil Service Listings</h2>
    <div class="card p-3">
        <table id="civilServiceTable" class="table table-hover w-100">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Job #</th>
                    <th>DLNR Division</th>
                    <th>Location</th>
                    <th>Salary <button id="salaryToggle" class="salary-toggle-btn">/yr</button></th>
                    <th>Posted</th>
                    <th>Closing Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="civil-service-data"></tbody>
        </table>
    </div>

    <h2>Contract Positions through RCUH</h2>
    <div class="card p-3">
        <table id="rcuhTable" class="table table-hover w-100">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>ID</th>
                    <th>Project</th>
                    <th>Closing Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="rcuh-data"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    let viewMonthly = false;

    function updateStatus(data) {
        const status = document.getElementById('status');
        const generated = data.generated_at_utc ? new Date(data.generated_at_utc).toLocaleString() : 'unknown';
        status.textContent = `Updated ${generated}. Data loaded successfully.`;
    }

    fetch('jobs.json')
        .then(response => response.json())
        .then(data => {
            const table = $('#civilServiceTable').DataTable({
                data: data.civil_service,
                columns: [
                    { data: 'title' },
                    { data: 'job_number' },
                    { data: 'division' },
                    { data: 'location' },
                    { 
                        data: 'yearly_salary',
                        render: function(data, type, row) {
                            if (!data) return "See Listing";
                            let amount = viewMonthly ? (data / 12) : data;
                            let label = viewMonthly ? "/mo" : "/yr";
                            return "$" + amount.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0}) + label;
                        }
                    },
                    { data: 'posted' },
                    { data: 'closing' },
                    { 
                        data: 'link',
                        render: function(data) {
                            return `<a href="${data}" target="_blank" class="btn btn-sm btn-apply">View Job</a>`;
                        }
                    }
                ],
                order: [[6, 'asc']]
            });

            // Toggle Salary logic
            $('#salaryToggle').on('click', function(e) {
                e.stopPropagation(); // Stop DataTables from sorting the column when button is clicked
                viewMonthly = !viewMonthly;
                $(this).text(viewMonthly ? '/mo' : '/yr');
                table.rows().invalidate().draw(); // Refresh the column calculations
            });

            // RCUH Table
            $('#rcuhTable').DataTable({
                data: data.rcuh,
                columns: [
                    { data: 'title' },
                    { data: 'id' },
                    { data: 'project' },
                    { data: 'closing' },
                    { 
                        data: 'link',
                        render: data => `<a href="${data}" target="_blank" class="btn btn-sm btn-apply">View Job</a>`
                    }
                ]
            });

            updateStatus(data);
        })
        .catch(error => {
            document.getElementById('status').textContent = `Error loading data: ${error.message}`;
        });
</script>
</body>
</html>
